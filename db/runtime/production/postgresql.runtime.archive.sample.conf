# ClaRTK runtime WAL archiving and recovery baseline.
# Add with include_if_exists from postgresql.conf after replacing archive paths/commands.

wal_level = replica
archive_mode = on
archive_timeout = '60s'
max_wal_senders = 3

# The archive command must fail with a nonzero exit status when the target file
# is unavailable or the copy did not complete.
archive_command = 'test ! -f <archive-destination>/%f && cp %p <archive-destination>/%f'

# Recommended for base backup + PITR operations.
max_replication_slots = 4
hot_standby = on

# Recovery settings belong on the restore target, not the primary. Example only:
# restore_command = 'cp <archive-source>/%f %p'
# recovery_target_timeline = 'latest'
# recovery_target_action = 'promote'
