# ClaRTK runtime observability baseline.
# Add with include_if_exists from postgresql.conf after confirming extension availability.

shared_preload_libraries = 'pg_stat_statements'
track_io_timing = on

# Slow-query and maintenance evidence.
log_min_duration_statement = '250ms'
log_autovacuum_min_duration = '250ms'
log_lock_waits = on
deadlock_timeout = '1s'

# Useful defaults for runtime troubleshooting.
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d app=%a '

# pg_stat_statements sizing can be tuned to local workload shape.
pg_stat_statements.max = 10000
pg_stat_statements.track = all
