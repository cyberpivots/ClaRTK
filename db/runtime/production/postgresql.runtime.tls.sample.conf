# ClaRTK runtime TLS settings for host-managed PostgreSQL.
# Add with include_if_exists from postgresql.conf after replacing placeholder paths.

ssl = on
ssl_cert_file = '<server-cert-path>'
ssl_key_file = '<server-key-path>'
ssl_ca_file = '<ca-cert-path>'

# Tighten protocol/cipher defaults for modern clients.
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.3'
ssl_ciphers = 'HIGH:!aNULL:!MD5'
ssl_prefer_server_ciphers = on

# Optional if your environment issues CRLs.
# ssl_crl_file = '<crl-path>'
