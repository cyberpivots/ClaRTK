# ClaRTK runtime PostgreSQL access policy.
# Merge these rules into the active pg_hba.conf after replacing placeholder CIDRs.

# Local DBA access for the host postgres user.
local   all                    postgres                      peer

# Reject non-TLS remote access before role-specific allow rules.
hostnossl all                  all                           0.0.0.0/0               reject
hostnossl all                  all                           ::/0                    reject

# Runtime application roles.
hostssl  clartk_runtime        clartk_runtime_api            <runtime-app-subnet-cidr>      scram-sha-256 clientcert=verify-full
hostssl  clartk_runtime        clartk_runtime_gateway        <runtime-gateway-subnet-cidr>  scram-sha-256 clientcert=verify-full
hostssl  clartk_runtime        clartk_runtime_readonly       <runtime-support-subnet-cidr>  scram-sha-256 clientcert=verify-full
hostssl  clartk_runtime        clartk_runtime_migrator       <runtime-admin-subnet-cidr>    scram-sha-256 clientcert=verify-full

# Backup/replication access.
hostssl  replication           clartk_runtime_backup         <runtime-backup-subnet-cidr>   scram-sha-256 clientcert=verify-full
hostssl  postgres              clartk_runtime_backup         <runtime-backup-subnet-cidr>   scram-sha-256 clientcert=verify-full

# Leave room below for explicit DBA break-glass entries if the environment requires them.
