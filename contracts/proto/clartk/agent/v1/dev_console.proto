syntax = "proto3";

package clartk.agent.v1;

message WorkspaceServiceHealth {
  string service = 1;
  string status = 2;
  string url = 3;
  string detail_json = 4;
}

message BackupSummary {
  string latest_backup_dir = 1;
  string latest_backup_kind = 2;
  string latest_backup_created_at = 3;
}

message WorkspaceHealth {
  string status = 1;
  string postgres_host = 2;
  uint32 postgres_port = 3;
  string postgres_source = 4;
  bool postgres_reachable = 5;
  BackupSummary backup = 6;
  repeated WorkspaceServiceHealth services = 7;
}

message AgentTaskDependency {
  int64 agent_task_id = 1;
  int64 depends_on_agent_task_id = 2;
  string created_at = 3;
}

message AgentTask {
  int64 agent_task_id = 1;
  string task_kind = 2;
  string queue_name = 3;
  string status = 4;
  int32 priority = 5;
  string payload_json = 6;
  string available_at = 7;
  string lease_owner = 8;
  string lease_expires_at = 9;
  int32 attempt_count = 10;
  int32 max_attempts = 11;
  string last_error = 12;
  string created_at = 13;
  string updated_at = 14;
  string completed_at = 15;
}

message QueueSnapshot {
  string queue_name = 1;
  int32 queued_count = 2;
  int32 leased_count = 3;
  int32 succeeded_count = 4;
  int32 failed_count = 5;
  repeated AgentTask recent_tasks = 6;
}

message AgentTaskCollection {
  repeated AgentTask items = 1;
  repeated QueueSnapshot queues = 2;
}

message EnqueueTaskRequest {
  string task_kind = 1;
  string queue_name = 2;
  int32 priority = 3;
  string payload_json = 4;
}

message RetryTaskRequest {
  string note = 1;
}

message AgentRun {
  int64 agent_run_id = 1;
  string agent_name = 2;
  string task_slug = 3;
  string status = 4;
  string started_at = 5;
  string finished_at = 6;
}

message AgentRunCollection {
  repeated AgentRun items = 1;
}

message AgentEvent {
  int64 agent_event_id = 1;
  int64 agent_run_id = 2;
  string event_type = 3;
  string payload_json = 4;
  string created_at = 5;
}

message AgentArtifact {
  int64 artifact_id = 1;
  int64 agent_run_id = 2;
  string artifact_kind = 3;
  string uri = 4;
  string metadata_json = 5;
  string created_at = 6;
}

message AgentRunDetail {
  AgentRun run = 1;
  AgentTask task = 2;
  repeated AgentTaskDependency dependencies = 3;
  repeated AgentEvent events = 4;
  repeated AgentArtifact artifacts = 5;
}

message DocsCatalogItem {
  string path = 1;
  string title = 2;
  string kind = 3;
  string summary = 4;
  string updated_at = 5;
  repeated string tags = 6;
}

message DocsCatalog {
  repeated DocsCatalogItem items = 1;
}

message SkillDescriptor {
  string skill_id = 1;
  string name = 2;
  string description = 3;
  string path = 4;
  string source = 5;
  bool available = 6;
}

message SkillCatalog {
  repeated SkillDescriptor items = 1;
}

message DevPreferenceSignal {
  int64 dev_preference_signal_id = 1;
  string runtime_account_id = 2;
  string signal_kind = 3;
  string surface = 4;
  string panel_key = 5;
  string payload_json = 6;
  string created_at = 7;
}

message DevPreferenceDecision {
  int64 dev_preference_decision_id = 1;
  string runtime_account_id = 2;
  int64 dev_preference_signal_id = 3;
  string decision_kind = 4;
  string subject_kind = 5;
  string subject_key = 6;
  string chosen_value = 7;
  string payload_json = 8;
  string created_at = 9;
}

message DevPreferenceScore {
  string runtime_account_id = 1;
  string feature_summary_json = 2;
  string scorecard_json = 3;
  uint32 computed_from_signal_count = 4;
  string updated_at = 5;
}

message DevPreferenceSignalCreateRequest {
  string signal_kind = 1;
  string surface = 2;
  string panel_key = 3;
  string payload_json = 4;
}

message DevPreferenceDecisionCreateRequest {
  int64 dev_preference_signal_id = 1;
  string decision_kind = 2;
  string subject_kind = 3;
  string subject_key = 4;
  string chosen_value = 5;
  string payload_json = 6;
}

message InventoryItem {
  int64 item_id = 1;
  string item_key = 2;
  string part_name = 3;
  string manufacturer = 4;
  string model = 5;
  string category = 6;
  string classification = 7;
  string status = 8;
  int32 total_units = 9;
  string latest_event_id = 10;
  string notes_json = 11;
  string created_at = 12;
  string updated_at = 13;
}

message InventoryItemCollection {
  repeated InventoryItem items = 1;
  string source = 2;
  int32 total = 3;
}

message InventoryUnit {
  int64 unit_id = 1;
  int64 item_id = 2;
  string unit_label = 3;
  string serial_number = 4;
  string asset_tag = 5;
  string status = 6;
  string location = 7;
  int64 current_build_id = 8;
  string latest_event_id = 9;
  string metadata_json = 10;
  string created_at = 11;
  string updated_at = 12;
}

message InventoryUnitCollection {
  repeated InventoryUnit units = 1;
  string source = 2;
  int32 total = 3;
}

message InventoryBuild {
  int64 build_id = 1;
  string build_name = 2;
  string build_kind = 3;
  string status = 4;
  int64 base_unit_id = 5;
  int64 rover_unit_id = 6;
  int64 reserved_by_account_id = 7;
  string runtime_device_id = 8;
  int64 current_task_id = 9;
  string expected_site = 10;
  string plan_json = 11;
  string result_json = 12;
  string latest_event_id = 13;
  string created_at = 14;
  string updated_at = 15;
}

message InventoryBuildCollection {
  repeated InventoryBuild builds = 1;
  string source = 2;
  int32 total = 3;
}

message InventoryEvent {
  int64 event_id = 1;
  string subject_kind = 2;
  int64 subject_id = 3;
  string event_kind = 4;
  string payload_json = 5;
  string actor = 6;
  int64 agent_task_id = 7;
  string created_at = 8;
}

message InventoryEventCollection {
  repeated InventoryEvent events = 1;
  string source = 2;
  int32 total = 3;
}

message PresentationDeckSource {
  string deck_key = 1;
  string title = 2;
  string markdown_path = 3;
  string companion_path = 4;
  string summary = 5;
  bool has_preview_companion = 6;
  int32 slide_count = 7;
  string updated_at = 8;
  repeated string tags = 9;
}

message PresentationDeckSourceCollection {
  repeated PresentationDeckSource items = 1;
  string source = 2;
  int32 total = 3;
}

message PresentationSlide {
  string slide_id = 1;
  string title = 2;
  string audience_goal = 3;
  repeated string bullets = 4;
  string visual_guidance = 5;
  repeated string evidence_paths = 6;
  bool has_preview_override = 7;
  string media_json = 8;
}

message PreviewRun {
  int64 preview_run_id = 1;
  string deck_key = 2;
  string title = 3;
  string markdown_path = 4;
  string companion_path = 5;
  string status = 6;
  string browser = 7;
  string viewport_json = 8;
  int64 current_task_id = 9;
  int64 render_task_id = 10;
  int64 analyze_task_id = 11;
  string manifest_json = 12;
  string render_summary_json = 13;
  string analysis_summary_json = 14;
  string created_at = 15;
  string updated_at = 16;
  string completed_at = 17;
}

message PreviewRunCollection {
  repeated PreviewRun runs = 1;
  string source = 2;
  int32 total = 3;
}

message PreviewFeedback {
  int64 preview_feedback_id = 1;
  int64 preview_run_id = 2;
  string slide_id = 3;
  string feedback_kind = 4;
  string comment = 5;
  string payload_json = 6;
  string created_by_account_id = 7;
  string created_at = 8;
}

message PreviewFeedbackCollection {
  repeated PreviewFeedback items = 1;
  string source = 2;
  int32 total = 3;
}

message UiReviewRun {
  int64 ui_review_run_id = 1;
  string surface = 2;
  string scenario_set = 3;
  string status = 4;
  string base_url = 5;
  string browser = 6;
  string viewport_json = 7;
  int64 current_task_id = 8;
  int64 capture_task_id = 9;
  int64 analyze_task_id = 10;
  int64 fix_draft_task_id = 11;
  string manifest_json = 12;
  string capture_summary_json = 13;
  string analysis_summary_json = 14;
  string created_at = 15;
  string updated_at = 16;
  string completed_at = 17;
}

message UiReviewRunCollection {
  repeated UiReviewRun runs = 1;
  string source = 2;
  int32 total = 3;
}

message UiReviewFinding {
  int64 ui_review_finding_id = 1;
  int64 ui_review_run_id = 2;
  string category = 3;
  string severity = 4;
  string status = 5;
  string title = 6;
  string summary = 7;
  string scenario_name = 8;
  string checkpoint_name = 9;
  string evidence_json = 10;
  string analyzer_json = 11;
  string fix_draft_json = 12;
  string reviewed_by_account_id = 13;
  string reviewed_at = 14;
  string created_at = 15;
}

message UiReviewFindingCollection {
  repeated UiReviewFinding findings = 1;
  string source = 2;
  int32 total = 3;
}

message UiReviewBaseline {
  int64 ui_review_baseline_id = 1;
  string surface = 2;
  string scenario_name = 3;
  string checkpoint_name = 4;
  string browser = 5;
  string viewport_key = 6;
  string relative_path = 7;
  string status = 8;
  int64 source_run_id = 9;
  string approved_by_account_id = 10;
  string metadata_json = 11;
  string created_at = 12;
  string superseded_at = 13;
}

message UiReviewBaselineCollection {
  repeated UiReviewBaseline baselines = 1;
  string source = 2;
  int32 total = 3;
}

message StartUiReviewRequest {
  string surface = 1;
  string scenario_set = 2;
  string base_url = 3;
  bool record_video = 4;
  string queue_name = 5;
  int32 priority = 6;
  string viewport_json = 7;
  string manifest_json = 8;
}

message ReviewUiFindingRequest {
  string status = 1;
  string review_payload_json = 2;
}

message PromoteUiReviewBaselineRequest {
  string queue_name = 1;
  int32 priority = 2;
}

message StartPreviewRunRequest {
  string deck_key = 1;
  string queue_name = 2;
  int32 priority = 3;
  string viewport_json = 4;
}

message CreatePreviewFeedbackRequest {
  int64 preview_run_id = 1;
  string slide_id = 2;
  string feedback_kind = 3;
  string comment = 4;
  string payload_json = 5;
}

message StartHardwareBuildRequest {
  string build_name = 1;
  string build_kind = 2;
  int64 base_unit_id = 3;
  int64 rover_unit_id = 4;
  string queue_name = 5;
  int32 priority = 6;
  string expected_site = 7;
  string plan_json = 8;
}

message StartHardwareBuildResponse {
  InventoryBuild build = 1;
  repeated AgentTask tasks = 2;
}

message TriggerHardwareRuntimePublishRequest {
  int64 build_id = 1;
  string runtime_device_id = 2;
  string queue_name = 3;
  int32 priority = 4;
}

message SeedInventoryRequest {
  string manifest_path = 1;
  bool force = 2;
}

message SeedInventoryResponse {
  int32 upserted_items = 1;
  int32 upserted_units = 2;
  string source = 3;
  int32 skipped_rows = 4;
}
